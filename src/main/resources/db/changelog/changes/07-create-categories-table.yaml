databaseChangeLog:
  - changeSet:
      id: 07-create-categories-table
      author: jacktyler
      changes:
        - createTable:
            tableName: categories
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: description
                  type: VARCHAR(255)

              - column:
                  name: is_deleted
                  type: boolean
                  constraints:
                    nullable: false
