databaseChangeLog:
  - changeSet:
      id: 06-assign-roles-to-users
      author: jacktyler
      changes:
        - sql:
            sql: >
              INSERT INTO users_roles (user_id, role_id)
              SELECT u.id, r.id
              FROM users u
              CROSS JOIN roles r
              WHERE r.name = 'ROLE_USER';
        - sql:
            sql: >
              INSERT INTO users_roles (user_id, role_id)
              SELECT u.id, r.id
              FROM users u
              CROSS JOIN roles r
              WHERE r.name = 'ROLE_ADMIN'
                AND u.email = 'admin@example.com';
